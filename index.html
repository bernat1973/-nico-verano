<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nico — Verano Fútbol</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --verde: #00E676;
    --verde-dark: #00C853;
    --naranja: #FF6D00;
    --fondo: #0A0E0A;
    --fondo2: #111711;
    --fondo3: #1A221A;
    --texto: #E8F5E9;
    --texto2: #9E9E9E;
    --rojo: #FF1744;
    --azul: #40C4FF;
    --amarillo: #FFD740;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--fondo);
    color: var(--texto);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--fondo2);
    border-top: 1px solid #1E2A1E;
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; color: var(--texto2);
    font-family: 'Barlow', sans-serif; font-size: 10px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
    cursor: pointer; padding: 6px 16px; border-radius: 12px;
    transition: all 0.2s;
  }
  .nav-btn.active { color: var(--verde); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* SCREENS */
  .screen { display: none; padding: 0 0 80px 0; min-height: 100vh; }
  .screen.active { display: block; }

  /* HOME */
  .home-header {
    background: linear-gradient(135deg, #0D1A0D 0%, #1A2E0F 100%);
    padding: 50px 20px 30px;
    position: relative; overflow: hidden;
  }
  .home-header::before {
    content: '⚽';
    position: absolute; right: -10px; top: 20px;
    font-size: 100px; opacity: 0.06;
    transform: rotate(-15deg);
  }
  .home-saludo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--verde); margin-bottom: 6px;
  }
  .home-nombre {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px; font-weight: 900;
    line-height: 1; color: var(--texto);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .home-fecha {
    font-size: 13px; color: var(--texto2);
    margin-top: 6px; font-weight: 500;
  }

  /* PROGRESO SEMANAS */
  .semana-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,230,118,0.1);
    border: 1px solid rgba(0,230,118,0.3);
    border-radius: 20px; padding: 6px 14px;
    margin-top: 16px;
    font-size: 13px; font-weight: 600; color: var(--verde);
  }

  /* TARJETA SESIÓN HOY */
  .sesion-hoy {
    margin: 20px 16px 0;
    background: var(--fondo2);
    border-radius: 20px;
    border: 1px solid #1E2A1E;
    overflow: hidden;
  }
  .sesion-hoy-header {
    background: linear-gradient(135deg, var(--verde) 0%, var(--verde-dark) 100%);
    padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sesion-hoy-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800;
    text-transform: uppercase; color: #000; letter-spacing: 0.5px;
  }
  .sesion-hoy-tipo {
    background: rgba(0,0,0,0.2);
    border-radius: 10px; padding: 4px 10px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; color: #000;
  }
  .sesion-hoy-body { padding: 16px 20px; }
  .sesion-preview {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 16px;
  }
  .sesion-preview-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--texto2);
  }
  .sesion-preview-item span:first-child {
    font-size: 16px; width: 24px; text-align: center;
  }
  .btn-iniciar {
    width: 100%;
    background: var(--verde);
    color: #000; border: none;
    border-radius: 14px; padding: 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-iniciar:active { transform: scale(0.97); background: var(--verde-dark); }

  /* DESCANSO */
  .descanso-card {
    margin: 20px 16px 0;
    background: var(--fondo2);
    border-radius: 20px;
    border: 1px solid #1E2A1E;
    padding: 30px 20px;
    text-align: center;
  }
  .descanso-emoji { font-size: 60px; margin-bottom: 12px; }
  .descanso-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 800;
    text-transform: uppercase; color: var(--azul);
    margin-bottom: 8px;
  }
  .descanso-texto { color: var(--texto2); font-size: 14px; line-height: 1.5; }

  /* STATS ROW */
  .stats-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin: 16px 16px 0;
  }
  .stat-card {
    background: var(--fondo2);
    border: 1px solid #1E2A1E;
    border-radius: 16px; padding: 14px 12px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px; font-weight: 900;
    color: var(--verde); line-height: 1;
  }
  .stat-label {
    font-size: 10px; color: var(--texto2);
    font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; margin-top: 4px;
  }

  /* MENSAJE ÁNIMO */
  .animo-card {
    margin: 16px 16px 0;
    background: linear-gradient(135deg, rgba(255,109,0,0.1) 0%, rgba(255,109,0,0.05) 100%);
    border: 1px solid rgba(255,109,0,0.3);
    border-radius: 16px; padding: 14px 16px;
    font-size: 14px; color: var(--texto);
    line-height: 1.5;
  }
  .animo-card strong { color: var(--naranja); }

  /* SECCIÓN TITLE */
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--texto2); padding: 20px 16px 10px;
  }

  /* SESION SCREEN */
  .sesion-topbar {
    background: var(--fondo2);
    padding: 50px 16px 16px;
    border-bottom: 1px solid #1E2A1E;
    display: flex; align-items: center; gap: 12px;
  }
  .btn-back {
    background: var(--fondo3); border: none; border-radius: 12px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--texto);
  }
  .sesion-topbar-info { flex: 1; }
  .sesion-topbar-nombre {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sesion-topbar-meta { font-size: 12px; color: var(--texto2); margin-top: 2px; }

  /* PROGRESS BAR */
  .progress-bar-container {
    margin: 16px 16px 0;
    background: var(--fondo3); border-radius: 10px; height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--verde);
    border-radius: 10px; transition: width 0.4s ease;
  }
  .progress-text {
    display: flex; justify-content: space-between;
    padding: 6px 16px 0;
    font-size: 11px; color: var(--texto2); font-weight: 600;
  }

  /* EJERCICIO CARD */
  .ejercicio-container { padding: 16px; }
  .ejercicio-card {
    background: var(--fondo2);
    border: 1px solid #1E2A1E;
    border-radius: 20px; overflow: hidden;
  }
  .ejercicio-header {
    padding: 20px 20px 16px;
  }
  .ejercicio-categoria {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .ejercicio-nombre {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 30px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.5px;
    line-height: 1.1;
  }
  .ejercicio-carga {
    display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap;
  }
  .carga-badge {
    background: rgba(0,230,118,0.1);
    border: 1px solid rgba(0,230,118,0.3);
    border-radius: 20px; padding: 5px 12px;
    font-size: 13px; font-weight: 600; color: var(--verde);
  }
  .ejercicio-desc {
    padding: 0 20px 16px;
    font-size: 14px; color: var(--texto2); line-height: 1.6;
  }
  .ejercicio-consejo {
    margin: 0 20px 16px;
    background: rgba(255,215,64,0.08);
    border-left: 3px solid var(--amarillo);
    border-radius: 0 8px 8px 0;
    padding: 10px 12px;
    font-size: 13px; color: var(--amarillo); line-height: 1.5;
  }
  .ejercicio-consejo strong { display: block; font-weight: 700; margin-bottom: 2px; }

  /* VIDEO */
  .video-toggle {
    margin: 0 20px 16px;
    background: rgba(64,196,255,0.08);
    border: 1px solid rgba(64,196,255,0.2);
    border-radius: 12px; overflow: hidden;
    cursor: pointer; color: var(--azul);
    transition: all 0.2s;
    text-decoration: none; display: block;
  }
  .video-toggle:active { background: rgba(64,196,255,0.15); }
  .video-thumb-wrap {
    position: relative; width: 100%;
    aspect-ratio: 16/9; overflow: hidden;
  }
  .video-thumb-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .video-play-icon {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60px; height: 42px;
    background: rgba(255,0,0,0.85);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .video-play-icon svg { width: 24px; height: 24px; }
  .video-toggle-label {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    font-size: 13px; font-weight: 600; color: var(--azul);
  }

  /* NAVEGACIÓN EJERCICIOS */
  .ejercicio-nav {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 0 16px 16px;
  }
  .btn-nav {
    padding: 14px; border: none; border-radius: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.5px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-nav:active { transform: scale(0.97); }
  .btn-anterior { background: var(--fondo3); color: var(--texto2); }
  .btn-siguiente { background: var(--verde); color: #000; }
  .btn-siguiente.ultimo { background: var(--naranja); }
  .btn-nav-full {
    padding: 16px; border: none; border-radius: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.5px;
    cursor: pointer; background: var(--naranja); color: #fff;
    width: calc(100% - 32px); margin: 0 16px 16px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.15s;
  }
  .btn-nav-full:active { transform: scale(0.97); }

  /* COMPLETAR SCREEN */
  .completar-container { padding: 20px 16px; }
  .completar-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 40px; font-weight: 900;
    text-transform: uppercase; color: var(--verde);
    text-align: center; line-height: 1;
  }
  .completar-sub {
    text-align: center; color: var(--texto2);
    font-size: 15px; margin-top: 6px; margin-bottom: 24px;
  }

  /* RPE */
  .rpe-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--texto2); margin-bottom: 12px;
  }
  .rpe-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 8px; margin-bottom: 20px;
  }
  .rpe-btn {
    aspect-ratio: 1; border: 2px solid #1E2A1E;
    border-radius: 14px; background: var(--fondo2);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800; color: var(--texto2);
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .rpe-btn.selected {
    border-color: var(--verde); color: var(--verde);
    background: rgba(0,230,118,0.1);
  }
  .rpe-desc {
    text-align: center; font-size: 13px; color: var(--texto2);
    margin-bottom: 20px; min-height: 20px;
  }

  /* MOLESTIAS */
  .molestias-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--texto2); margin-bottom: 12px;
  }
  .molestias-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 20px;
  }
  .molestia-btn {
    padding: 12px 8px; border: 2px solid #1E2A1E;
    border-radius: 12px; background: var(--fondo2);
    font-size: 13px; font-weight: 600; color: var(--texto2);
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .molestia-btn.selected {
    border-color: var(--rojo); color: var(--rojo);
    background: rgba(255,23,68,0.08);
  }
  .molestia-btn.ninguna.selected {
    border-color: var(--verde); color: var(--verde);
    background: rgba(0,230,118,0.08);
  }

  /* NOTA */
  .nota-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--texto2); margin-bottom: 10px;
  }
  .nota-input {
    width: 100%; background: var(--fondo2);
    border: 2px solid #1E2A1E; border-radius: 14px;
    padding: 14px 16px; color: var(--texto);
    font-family: 'Barlow', sans-serif; font-size: 14px;
    resize: none; height: 80px;
    margin-bottom: 20px;
  }
  .nota-input:focus { outline: none; border-color: rgba(0,230,118,0.4); }
  .nota-input::placeholder { color: var(--texto2); }

  /* BTN WHATSAPP */
  .btn-whatsapp {
    width: 100%; padding: 18px;
    background: #25D366; border: none; border-radius: 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.15s; margin-bottom: 10px;
  }
  .btn-whatsapp:active { transform: scale(0.97); }

  /* HISTORIAL */
  .historial-container { padding: 0 16px 16px; }
  .semana-bloque { margin-bottom: 24px; }
  .semana-bloque-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--texto2); margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .semana-pct {
    font-size: 13px; color: var(--verde); font-weight: 700;
  }
  .dias-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .dia-chip {
    aspect-ratio: 1; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700;
    text-transform: uppercase;
  }
  .dia-chip.completado { background: var(--verde); color: #000; }
  .dia-chip.descanso { background: rgba(64,196,255,0.15); color: var(--azul); font-size: 10px; }
  .dia-chip.pendiente { background: var(--fondo3); color: var(--texto2); }
  .dia-chip.hoy { background: rgba(0,230,118,0.2); color: var(--verde); border: 2px solid var(--verde); }

  /* HISTORIAL DETALLE */
  .historial-item {
    background: var(--fondo2); border: 1px solid #1E2A1E;
    border-radius: 16px; padding: 14px 16px;
    margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .historial-item-fecha {
    font-size: 12px; color: var(--texto2); margin-bottom: 3px;
  }
  .historial-item-nombre {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700;
    text-transform: uppercase;
  }
  .historial-item-rpe {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 900;
  }

  /* PLAN SCREEN */
  .plan-container { padding: 0 16px 16px; }
  .bloque-card {
    background: var(--fondo2); border: 1px solid #1E2A1E;
    border-radius: 16px; margin-bottom: 12px; overflow: hidden;
  }
  .bloque-header {
    padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer;
  }
  .bloque-nombre {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 800;
    text-transform: uppercase;
  }
  .bloque-semanas {
    font-size: 12px; color: var(--texto2); font-weight: 600;
  }
  .bloque-body { padding: 0 16px 14px; display: none; }
  .bloque-body.open { display: block; }
  .bloque-dia {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-top: 1px solid #1E2A1E;
  }
  .bloque-dia-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--texto2); min-width: 36px;
    text-transform: uppercase;
  }
  .bloque-dia-info { flex: 1; }
  .bloque-dia-tipo {
    font-size: 13px; font-weight: 600; color: var(--texto);
  }
  .bloque-dia-ejercs {
    font-size: 12px; color: var(--texto2); margin-top: 2px;
    line-height: 1.5;
  }

  /* ANIMACIONES */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .screen.active { animation: fadeSlideUp 0.3s ease; }

  /* STREAK */
  .streak-row {
    display: flex; gap: 6px; align-items: center;
    padding: 12px 16px;
  }
  .streak-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--fondo3);
  }
  .streak-dot.done { background: var(--verde); }

</style>
</head>
<body>

<!-- ===== SCREEN: HOME ===== -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-saludo" id="saludo-texto">Buenos días</div>
    <div class="home-nombre">Nico 💪</div>
    <div class="home-fecha" id="fecha-hoy"></div>
    <div class="semana-badge" id="semana-badge">
      <span>📅</span>
      <span id="semana-badge-texto">Semana 1 de 10</span>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-completadas">0</div>
      <div class="stat-label">Sesiones</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-racha">0</div>
      <div class="stat-label">Racha 🔥</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-dias">0</div>
      <div class="stat-label" id="stat-dias-label">Días restantes</div>
    </div>
  </div>

  <div id="home-sesion-area"></div>

  <div class="animo-card" id="animo-card"></div>

  <div class="section-title">Esta semana</div>
  <div class="streak-row" id="streak-row"></div>
</div>

<!-- ===== SCREEN: SESIÓN ===== -->
<div id="screen-sesion" class="screen">
  <div class="sesion-topbar">
    <button class="btn-back" onclick="volverHome()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <div class="sesion-topbar-info">
      <div class="sesion-topbar-nombre" id="sesion-nombre-top"></div>
      <div class="sesion-topbar-meta" id="sesion-meta-top"></div>
    </div>
  </div>

  <div class="progress-bar-container">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
  <div class="progress-text">
    <span id="progress-actual"></span>
    <span id="progress-total"></span>
  </div>

  <div class="ejercicio-container" id="ejercicio-container"></div>

  <div class="ejercicio-nav" id="ejercicio-nav"></div>
</div>

<!-- ===== SCREEN: COMPLETAR ===== -->
<div id="screen-completar" class="screen">

// Día de semana: 0=Dom, 1=Lun, 2=Mar, 3=Mie, 4=Jue, 5=Vie, 6=Sáb
// Tipo de sesión por día de semana
function getTipoSesion(diaSemana, semana) {
  // Calendario: 4 días de calidad + 3 de descanso/opcional
  // Lun: Fuerza+Técnica | Mié: Pliometría+Velocidad+Cardio corto | Vie: Fuerza+Técnica | Sáb: Cardio suave+Balón
  // Mar, Jue, Dom: descanso (movilidad opcional)
  // Fuerza 2x/sem (objetivo: ganar) · Pliometría 1x · Cardio 2x (1 intervalos + 1 suave)
  // Semanas 5 y 10: descarga

  const esDescarga = semana === 5 || semana === 10;

  const plan = {
    1: { tipo: 'fuerza_tecnica', nombre: 'Fuerza + Técnica', icono: '💪' },
    2: { tipo: 'descanso_opcional', nombre: 'Descanso (movilidad opcional)', icono: '😌' },
    3: { tipo: 'pliometria', nombre: 'Pliometría + Velocidad', icono: '⚡' },
    4: { tipo: 'descanso', nombre: 'Descanso', icono: '😴' },
    5: { tipo: 'fuerza_tecnica', nombre: 'Fuerza + Técnica', icono: '💪' },
    6: { tipo: 'cardio_balon', nombre: 'Cardio suave + Balón', icono: '⚽' },
    0: { tipo: 'descanso', nombre: 'Descanso', icono: '😴' }
  };

  if (esDescarga) {
    const planDesc = { ...plan };
    // En descarga: una sesión de fuerza menos, pliometría suave
    planDesc[5] = { tipo: 'descanso_opcional', nombre: 'Descanso (movilidad opcional)', icono: '😌' };
    planDesc[3] = { tipo: 'pliometria', nombre: 'Pliometría suave', icono: '⚡' };
    return planDesc[diaSemana];
  }

  return plan[diaSemana];
}

// Progresión de fuerza: las reps suben por bloques (ganancia neural pre-PHV)
function fuerzaProgresada(semana) {
  const esDescarga = semana === 5 || semana === 10;

  // Reps de sentadilla/zancada/hip thrust y segundos de plancha según fase
  let repSentadilla, repZancada, repHip, segPlancha, segPlanchaLat;
  // Rampa del curl nórdico (ejercicio muy exigente — empezar suave)
  let nordico;

  if (esDescarga) {
    repSentadilla = '2×10 rep'; repZancada = '2×8 rep cada pierna'; repHip = '2×12 rep';
    segPlancha = '2×30 seg'; segPlanchaLat = '2×20 seg cada lado';
    nordico = '2×3 rep';
  } else if (semana <= 3) {
    // Bloque inicial
    repSentadilla = '3×10 rep'; repZancada = '3×8 rep cada pierna'; repHip = '3×12 rep';
    segPlancha = '3×30 seg'; segPlanchaLat = '3×20 seg cada lado';
    nordico = (semana <= 2) ? '2×3 rep' : '2×4 rep'; // semanas 1-2 muy suave
  } else if (semana <= 7) {
    // Bloque medio (más reps = más estímulo)
    repSentadilla = '3×12 rep'; repZancada = '3×10 rep cada pierna'; repHip = '3×15 rep';
    segPlancha = '3×40 seg'; segPlanchaLat = '3×25 seg cada lado';
    nordico = '3×4 rep';
  } else {
    // Bloque final (máximo del verano)
    repSentadilla = '3×15 rep'; repZancada = '3×12 rep cada pierna'; repHip = '3×18 rep';
    segPlancha = '3×45 seg'; segPlanchaLat = '3×30 seg cada lado';
    nordico = '3×5 rep';
  }

  return {
    sentadilla: { ...EJERCICIOS.fuerza[0], series: repSentadilla },
    zancada: { ...EJERCICIOS.fuerza[1], series: repZancada },
    hip: { ...EJERCICIOS.fuerza[2], series: repHip },
    nordico: { ...EJERCICIOS.fuerza[3], series: nordico },
    plancha: { ...EJERCICIOS.fuerza[4], series: segPlancha },
    planchaLat: { ...EJERCICIOS.fuerza[5], series: segPlanchaLat }
  };
}

function getSesionEjercicios(tipo, semana) {
  const esDescarga = semana === 5 || semana === 10;
  const F = fuerzaProgresada(semana);

  switch(tipo) {
    case 'pliometria':
      return [
        ...EJERCICIOS.calentamiento,
        EJERCICIOS.pliometria[0], // saltos 2 pies
        EJERCICIOS.pliometria[1], // saltos 1 pie
        EJERCICIOS.pliometria[2], // horizontales
        EJERCICIOS.pliometria[3], // sprint 10m
        ...(esDescarga ? [] : [EJERCICIOS.pliometria[4], EJERCICIOS.pliometria[5]]), // sprint 20m + cambios dir
        EJERCICIOS.aerobico[1], // cardio corto: intervalos
        EJERCICIOS.movilidad[0], // movilidad cadera al final
      ];
    case 'fuerza_tecnica':
      return [
        ...EJERCICIOS.calentamiento.slice(0,2),
        F.sentadilla,
        F.zancada,
        F.hip,
        F.nordico,
        F.plancha,
        ...(esDescarga ? [] : [F.planchaLat]),
        EJERCICIOS.tecnica[1], // conducción
        EJERCICIOS.movilidad[1], // estiramiento isquio (vuelta a la calma)
      ];
    case 'cardio_balon':
      return [
        ...EJERCICIOS.calentamiento.slice(0,2),
        EJERCICIOS.aerobico[0], // carrera continua suave
        EJERCICIOS.tecnica[0], // toque pared
        EJERCICIOS.tecnica[2], // malabares (lúdico)
        EJERCICIOS.movilidad[3], // estiramiento cuádriceps
      ];
    case 'descanso_opcional':
    case 'movilidad':
      return [...EJERCICIOS.movilidad];
    default:
      return [...EJERCICIOS.movilidad];
  }
}

const INICIO = new Date('2026-06-15');
const FIN = new Date('2026-08-24');
const NUM_SEMANAS = 10;

let estadoActual = {
  sesionesCompletadas: [],
  ejercicioActual: 0,
  sesionActualTipo: null,
  sesionActualNombre: null,
  rpeSeleccionado: null,
  molestias: []
};

function cargarEstado() {
  const guardado = localStorage.getItem('nico_verano_2026');
  if (guardado) {
    try {
      estadoActual = { ...estadoActual, ...JSON.parse(guardado) };
    } catch(e) {}
  }
}

function guardarEstado() {
  localStorage.setItem('nico_verano_2026', JSON.stringify({
    sesionesCompletadas: estadoActual.sesionesCompletadas
  }));
}

function getHoy() {
  return new Date();
}

function yaEmpezo() {
  const hoy = getHoy();
  const h = new Date(hoy); h.setHours(0,0,0,0);
  const ini = new Date(INICIO); ini.setHours(0,0,0,0);
  return h >= ini;
}

function diasParaEmpezar() {
  const hoy = getHoy();
  const h = new Date(hoy); h.setHours(0,0,0,0);
  const ini = new Date(INICIO); ini.setHours(0,0,0,0);
  return Math.ceil((ini - h) / (1000 * 60 * 60 * 24));
}

function getSemanaActual() {
  if (!yaEmpezo()) return 0; // aún no ha empezado
  const hoy = getHoy();
  const diff = Math.floor((hoy - INICIO) / (1000 * 60 * 60 * 24 * 7));
  return Math.max(1, Math.min(NUM_SEMANAS, diff + 1));
}

function getDiasRestantes() {
  const hoy = getHoy();
  const diff = Math.ceil((FIN - hoy) / (1000 * 60 * 60 * 24));
  return Math.max(0, diff);
}

function formatFecha(fecha) {
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${dias[fecha.getDay()]}, ${fecha.getDate()} de ${meses[fecha.getMonth()]}`;
}

function getSaludo() {
  const h = new Date().getHours();
  if (h < 13) return 'Buenos días';
  if (h < 20) return 'Buenas tardes';
  return 'Buenas noches';
}

function getNumRacha() {
  if (estadoActual.sesionesCompletadas.length === 0) return 0;
  const ordenadas = [...estadoActual.sesionesCompletadas].sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
  let racha = 0;
  let fechaComp = new Date(ordenadas[0].fecha);
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  fechaComp.setHours(0,0,0,0);
  const diffDias = Math.floor((hoy - fechaComp) / (1000*60*60*24));
  if (diffDias > 1) return 0;
  racha = 1;
  for (let i = 1; i < ordenadas.length; i++) {
    const prev = new Date(ordenadas[i-1].fecha);
    const curr = new Date(ordenadas[i].fecha);
    prev.setHours(0,0,0,0); curr.setHours(0,0,0,0);
    if (Math.floor((prev - curr) / (1000*60*60*24)) === 1) {
      racha++;
    } else break;
  }
  return racha;
}

function hayCompletadoHoy() {
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  return estadoActual.sesionesCompletadas.some(s => {
    const f = new Date(s.fecha);
    f.setHours(0,0,0,0);
    return f.getTime() === hoy.getTime();
  });
}

function renderStreakSemana() {
  const hoy = getHoy();
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() - ((hoy.getDay() + 6) % 7));
  const diasSemana = ['L','M','X','J','V','S','D'];
  let html = '';
  for (let i = 0; i < 7; i++) {
    const dia = new Date(lunes);
    dia.setDate(lunes.getDate() + i);
    dia.setHours(0,0,0,0);
    const hoyD = new Date(hoy); hoyD.setHours(0,0,0,0);
    const tipoD = getTipoSesion(dia.getDay(), getSemanaActual());
    const completado = estadoActual.sesionesCompletadas.some(s => {
      const f = new Date(s.fecha); f.setHours(0,0,0,0);
      return f.getTime() === dia.getTime();
    });
    const esHoy = dia.getTime() === hoyD.getTime();

    let clase = 'pendiente';
    let texto = diasSemana[i];
    if (completado) clase = 'completado';
    else if (tipoD.tipo === 'descanso') { clase = 'descanso'; texto = '—'; }
    else if (esHoy) clase = 'hoy';

    html += `<div class="dia-chip ${clase}">${texto}</div>`;
  }
  document.getElementById('streak-row').innerHTML = html;
}

  document.getElementById('rpe-desc').textContent = '';

  // Molestias
  const molestias = ['Rodilla','Tobillo','Muslo','Cadera','Espalda','Ninguna'];
  let molHTML = molestias.map(m =>
    `<button class="molestia-btn ${m==='Ninguna'?'ninguna':''}" onclick="toggleMolestia('${m}', this)">${m}</button>`
  ).join('');
  document.getElementById('molestias-grid').innerHTML = molHTML;

  document.getElementById('nota-input').value = '';
}

function seleccionarRPE(n) {
  estadoActual.rpeSeleccionado = n;
  for (let i = 1; i <= 10; i++) {
    document.getElementById('rpe-' + i).classList.toggle('selected', i === n);
  }
  document.getElementById('rpe-desc').textContent = RPE_TEXTOS[n] || '';
}

function toggleMolestia(m, btn) {
  if (m === 'Ninguna') {
    estadoActual.molestias = ['Ninguna'];
    document.querySelectorAll('.molestia-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    return;
  }
  const idx = estadoActual.molestias.indexOf(m);
  const ningunaIdx = estadoActual.molestias.indexOf('Ninguna');
  if (ningunaIdx > -1) {
    estadoActual.molestias.splice(ningunaIdx, 1);
    document.querySelector('.molestia-btn.ninguna').classList.remove('selected');
  }
  if (idx > -1) {
    estadoActual.molestias.splice(idx, 1);
    btn.classList.remove('selected');
  } else {
    estadoActual.molestias.push(m);
    btn.classList.add('selected');
  }
}

function enviarWhatsApp() {
  // Guardar sesión
  const sesion = {
    fecha: new Date().toISOString(),
    nombre: estadoActual.sesionActualNombre,
    ejercicios: sesionEjercicios.length,
    rpe: estadoActual.rpeSeleccionado,
    molestias: estadoActual.molestias,
    nota: document.getElementById('nota-input').value,
    semana: getSemanaActual()
  };
  estadoActual.sesionesCompletadas.push(sesion);
  guardarEstado();

  // Construir mensaje
  const fecha = formatFecha(new Date());
  const rpeTexto = sesion.rpe ? `${sesion.rpe}/10 — ${RPE_TEXTOS[sesion.rpe]}` : 'No indicado';
  const molTexto = sesion.molestias.length > 0 ? sesion.molestias.join(', ') : 'Ninguna';
  const racha = getNumRacha();

  let msg = `⚽ *NICO — ENTRENAMIENTO COMPLETADO*\n`;
  msg += `📅 ${fecha}\n`;
  msg += `💪 *Sesión:* ${sesion.nombre}\n`;
  msg += `📋 *Semana:* ${sesion.semana} de ${NUM_SEMANAS}\n`;
  msg += `🔢 *Ejercicios:* ${sesion.ejercicios}\n`;
  msg += `😮‍💨 *Esfuerzo (RPE):* ${rpeTexto}\n`;
  msg += `🦵 *Molestias:* ${molTexto}\n`;
  msg += `🔥 *Racha:* ${racha} día${racha !== 1 ? 's' : ''} seguido${racha !== 1 ? 's' : ''}\n`;
  msg += `📊 *Total sesiones:* ${estadoActual.sesionesCompletadas.length}\n`;
  if (sesion.nota) msg += `📝 *Nota:* ${sesion.nota}\n`;

  const tel = '34649052317'; // Número de Bernat
  const url = `https://wa.me/${tel}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

function irHome() {
  renderHome();
  showScreen('home');
}

// ============================================================
// HISTORIAL
// ============================================================
function renderHistorial() {
  const container = document.getElementById('historial-container');
  const completadas = estadoActual.sesionesCompletadas;

  if (completadas.length === 0) {
    container.innerHTML = `
      <div style="text-align:center; padding:40px 20px; color:var(--texto2);">
        <div style="font-size:48px; margin-bottom:12px;">📭</div>
        <div style="font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; text-transform:uppercase; color:var(--texto);">Sin sesiones aún</div>
        <div style="font-size:14px; margin-top:6px;">¡Completa tu primera sesión hoy!</div>
      </div>`;
    return;
  }

  const ordenadas = [...completadas].sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
  let html = '';
  ordenadas.forEach(s => {
    const f = new Date(s.fecha);
    const rpeColor = !s.rpe ? 'var(--texto2)' : s.rpe <= 4 ? 'var(--verde)' : s.rpe <= 7 ? 'var(--amarillo)' : 'var(--rojo)';
    const molTexto = s.molestias && s.molestias.length > 0 && !s.molestias.includes('Ninguna')
      ? `⚠️ ${s.molestias.join(', ')}`
      : '';
    html += `
      <div class="historial-item">
        <div>
          <div class="historial-item-fecha">${formatFecha(f)} · Semana ${s.semana || '?'}</div>
          <div class="historial-item-nombre">${s.nombre}</div>
          ${molTexto ? `<div style="font-size:12px; color:var(--rojo); margin-top:3px;">${molTexto}</div>` : ''}
        </div>
        <div style="text-align:right;">
          <div class="historial-item-rpe" style="color:${rpeColor}">${s.rpe || '—'}</div>
          <div style="font-size:10px; color:var(--texto2); text-transform:uppercase; letter-spacing:0.5px;">RPE</div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

// ============================================================
// PLAN
// ============================================================
function renderPlan() {
  const container = document.getElementById('plan-container');
  const bloques = [
    { nombre: 'Semanas 1–3', semRef: 1, color: '#40C4FF', descripcion: 'Arranque. Fuerza con reps moderadas. El curl nórdico empieza muy suave.' },
    { nombre: 'Semana 5 · Descarga', semRef: 5, color: '#FFD740', descripcion: 'Semana suave a mitad de verano. Menos carga para recuperar.' },
    { nombre: 'Semanas 6–9', semRef: 8, color: '#FF6D00', descripcion: 'Fase de más estímulo. Las reps de fuerza suben (ganancia neural).' },
    { nombre: 'Semana 10 · Descarga', semRef: 10, color: '#FFD740', descripcion: 'Descarga final. Llegar fresco a la pretemporada.' }
  ];

  const diasNombres = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const diasOrden = [1,2,3,4,5,6,0]; // Lunes primero

  let html = '';
  bloques.forEach((bloque, bi) => {
    const semNum = bloque.semRef;
    let diasHTML = '';
    diasOrden.forEach(d => {
      const tipo = getTipoSesion(d, semNum);
      let ejercsDetalle = '';
      if (tipo.tipo !== 'descanso') {
        const ejercs = getSesionEjercicios(tipo.tipo, semNum);
        ejercsDetalle = ejercs.map(e => {
          const carga = [e.series, e.tiempo].filter(Boolean).join(' · ');
          return `<div style="display:flex;gap:8px;align-items:baseline;padding:2px 0;">
            <span style="color:${e.color};font-size:11px;">●</span>
            <span style="font-size:12px;color:var(--texto);">${e.nombre}</span>
            ${carga ? `<span style="font-size:11px;color:var(--texto2);margin-left:auto;white-space:nowrap;">${carga}</span>` : ''}
          </div>`;
        }).join('');
      }
      diasHTML += `
        <div class="bloque-dia">
          <div class="bloque-dia-num">${diasNombres[diasOrden.indexOf(d)]}</div>
          <div class="bloque-dia-info">
            <div class="bloque-dia-tipo">${tipo.icono} ${tipo.nombre}</div>
            ${ejercsDetalle ? `<div style="margin-top:6px;padding-left:2px;">${ejercsDetalle}</div>` : ''}
          </div>
        </div>`;
    });

    html += `
      <div class="bloque-card">
        <div class="bloque-header" onclick="toggleBloque(${bi})">
          <div>
            <div class="bloque-nombre" style="color:${bloque.color}">${bloque.nombre}</div>
            <div class="bloque-semanas">${bloque.descripcion}</div>
          </div>
          <span id="arrow-${bi}" style="color:var(--texto2); font-size:20px;">▸</span>
        </div>
        <div class="bloque-body" id="bloque-body-${bi}">
          ${diasHTML}
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function toggleBloque(idx) {
  const body = document.getElementById('bloque-body-' + idx);
  const arrow = document.getElementById('arrow-' + idx);
  const abierto = body.classList.toggle('open');
  arrow.textContent = abierto ? '▾' : '▸';
}

// ============================================================
// NAVEGACIÓN
// ============================================================
function showScreen(nombre) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('screen-' + nombre).classList.add('active');
  const navBtn = document.getElementById('nav-' + nombre);
  if (navBtn) navBtn.classList.add('active');

  if (nombre === 'home') renderHome();
  if (nombre === 'historial') renderHistorial();
  if (nombre === 'plan') renderPlan();

  window.scrollTo(0, 0);
}

// ============================================================
// INIT
// ============================================================
cargarEstado();
renderHome();
</script>
